<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — The Asten Vale Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1c120a; --ink-faded: #4a3728; --paper: #c9a97a; --paper-dark: #b8935e;
      --gold: #c9960c; --green-pine: #4a7c4e; --folder-red: #7a1f1f; --bg: #0c0a06; --paper-bg: #c4a472;
      --font-type: 'Courier Prime', 'Courier New', Courier, monospace;
      --font-header: 'Special Elite', 'Courier New', serif;
    }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-type); min-height: 100vh; }

    .page-hero { position: relative; min-height: 30vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 2rem 3rem; }
    .page-hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(245,166,35,0.04) 0%, transparent 70%); pointer-events: none; }
    .page-eyebrow { font-family: var(--font-type); font-size: 0.65rem; letter-spacing: 0.32em; color: rgba(201,169,122,0.4); text-transform: uppercase; margin-bottom: 0.4rem; position: relative; }
    .page-title { font-family: var(--font-header); font-size: clamp(1.8rem, 5vw, 3rem); letter-spacing: 0.12em; color: rgba(220,190,140,0.95); text-transform: uppercase; text-shadow: 0 2px 30px rgba(0,0,0,0.8); margin-bottom: 0.75rem; position: relative; }
    .page-rule { width: 40px; height: 1px; background: rgba(201,169,122,0.3); margin: 0 auto 0.75rem; }

    .paper-section { background: var(--paper-bg); position: relative; }
    .paper-section::before { content: ""; display: block; height: 28px; background: var(--paper-bg); clip-path: polygon(0% 100%, 1% 20%, 2.5% 90%, 4% 10%, 5.5% 80%, 7% 5%, 8.5% 85%, 10% 15%, 11.5% 75%, 13% 25%, 14.5% 70%, 16% 30%, 17.5% 65%, 19% 20%, 20.5% 80%, 22% 10%, 23.5% 90%, 25% 15%, 26.5% 75%, 28% 35%, 29.5% 60%, 31% 25%, 32.5% 70%, 34% 10%, 35.5% 85%, 37% 20%, 38.5% 75%, 40% 30%, 41.5% 65%, 43% 15%, 44.5% 80%, 46% 20%, 47.5% 70%, 49% 10%, 50.5% 90%, 52% 25%, 53.5% 60%, 55% 15%, 56.5% 80%, 58% 30%, 59.5% 65%, 61% 10%, 62.5% 85%, 64% 20%, 65.5% 75%, 67% 35%, 68.5% 60%, 70% 15%, 71.5% 80%, 73% 25%, 74.5% 70%, 76% 10%, 77.5% 90%, 79% 20%, 80.5% 65%, 82% 30%, 83.5% 75%, 85% 15%, 86.5% 80%, 88% 25%, 89.5% 60%, 91% 10%, 92.5% 85%, 94% 20%, 95.5% 70%, 97% 30%, 98.5% 80%, 100% 0%, 100% 100%); }

    .site-footer { background: var(--bg); padding: 1.5rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(201,169,122,0.08); }
    .footer-motto { display: flex; align-items: center; gap: 0.85rem; }
    .footer-motto svg { opacity: 0.55; flex-shrink: 0; }
    .footer-motto-text { font-family: var(--font-header); font-size: 0.68rem; letter-spacing: 0.18em; color: rgba(201,169,122,0.45); text-transform: uppercase; line-height: 1.4; }
    @media (max-width: 640px) { .site-footer { flex-direction: column; gap: 1rem; text-align: center; } .footer-motto { justify-content: center; } }

    
    
    
    
    
    
    

    .wrap{max-width:560px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
    .card{background:var(--paper);color:var(--ink);padding:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.35);margin-bottom:1.25rem;}
    .field-row{margin-bottom:1.1rem;}
    .field-label{font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faded);margin-bottom:0.4rem;display:block;}
    .field-row input[type="text"]{width:100%;padding:0.65rem 0.75rem;font-family:var(--font-type);font-size:0.85rem;border:1px solid rgba(60,30,10,0.25);background:rgba(255,255,255,0.4);color:var(--ink);}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;border-top:1px solid rgba(60,30,10,0.12);}
    .toggle-row:first-of-type{border-top:none;}
    .toggle-row-label{font-size:0.78rem;}
    .toggle-row-sub{font-size:0.65rem;color:var(--ink-faded);font-style:italic;margin-top:0.15rem;}
    input[type="checkbox"]{width:18px;height:18px;cursor:pointer;flex-shrink:0;}
    .save-btn{font-family:var(--font-header);font-size:0.8rem;letter-spacing:0.08em;color:#fff;background:var(--folder-red);padding:0.75rem 1.5rem;border:none;text-transform:uppercase;cursor:pointer;width:100%;margin-top:0.5rem;}
    .save-btn:hover{background:#8b1a1a;}
    .save-note{font-size:0.72rem;color:var(--green-pine);margin-top:0.6rem;display:none;}
    .card-title{font-family:var(--font-header);font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faded);margin-bottom:1rem;}

    .logout-btn{display:block;width:100%;text-align:center;font-family:var(--font-header);font-size:0.8rem;letter-spacing:0.08em;color:var(--ink-faded);background:transparent;border:1px solid rgba(60,30,10,0.25);padding:0.75rem;text-transform:uppercase;cursor:pointer;}
    .logout-btn:hover{color:var(--folder-red);border-color:rgba(60,30,10,0.5);}

    #loadingNote{text-align:center;padding:4rem 1rem;color:rgba(201,169,122,0.5);font-size:0.8rem;}
  
    
    
    
    
    
    
    
    
    
    
</style>
  <link rel="stylesheet" href="css/game-nav.css" />
</head>
<body>

    <script src="js/game-nav.js"></script>

  <div id="loadingNote">Retrieving your settings&hellip;</div>

  <div id="settingsContent" style="display:none;">
    <div class="page-hero">
      <p class="page-eyebrow">Case File Settings</p>
      <h1 class="page-title">Settings</h1>
      <div class="page-rule"></div>
    </div>

   <section class="paper-section">
    <div class="wrap">
      <div class="card">
        <div class="card-title">Detective Identity</div>
        <div class="field-row">
          <label class="field-label" for="displayNameInput">Display Name</label>
          <input type="text" id="displayNameInput" placeholder="How other investigators see you" maxlength="40" />
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-row-label">Public Profile</div>
            <div class="toggle-row-sub">Show your name and stats on the leaderboard.</div>
          </div>
          <input type="checkbox" id="publicProfileToggle" />
        </div>
        <button class="save-btn" id="saveIdentityBtn">Save Changes</button>
        <div class="save-note" id="identitySaveNote">Saved.</div>
      </div>

      <div class="card">
        <div class="card-title">Notifications</div>
        <div class="toggle-row">
          <div>
            <div class="toggle-row-label">Newsletter</div>
            <div class="toggle-row-sub">This archive section is being indexed.</div>
          </div>
          <input type="checkbox" disabled />
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-row-label">New Case Alerts</div>
            <div class="toggle-row-sub">This archive section is being indexed.</div>
          </div>
          <input type="checkbox" disabled />
        </div>
      </div>

      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
   </section>

   <footer class="site-footer">
    <div class="footer-motto">
      <svg width="28" height="28" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="27" stroke="rgba(201,169,122,0.5)" stroke-width="1.2"/>
        <polygon points="30,10 25,22 35,22" fill="rgba(201,169,122,0.6)"/>
        <polygon points="30,16 21,30 39,30" fill="rgba(201,169,122,0.6)"/>
        <rect x="27" y="30" width="6" height="5" fill="rgba(201,169,122,0.55)"/>
      </svg>
      <span class="footer-motto-text">Truth is not given.<br>It is discovered.</span>
    </div>
   </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/progress-sync.js"></script>
  <script>
  (function () {
    var currentUser = null;

    function render(user, player) {
      currentUser = user;
      document.getElementById('loadingNote').style.display = 'none';
      document.getElementById('settingsContent').style.display = 'block';
      document.getElementById('displayNameInput').value = (player && player.display_name) || '';
      document.getElementById('publicProfileToggle').checked = !!(player && player.public_profile);
    }

    if (!window.AVProgressSync) {
      document.getElementById('loadingNote').textContent = 'Settings are unavailable right now.';
      return;
    }

    function doLogout() {
      window.AVProgressSync.signOut(function () { window.location.href = 'index.html'; });
    }
    document.getElementById('logoutBtn').addEventListener('click', doLogout);

    document.getElementById('saveIdentityBtn').addEventListener('click', function () {
      if (!currentUser) return;
      var name = document.getElementById('displayNameInput').value.trim();
      var isPublic = document.getElementById('publicProfileToggle').checked;
      window.AVProgressSync.setPublicProfile(currentUser, name, isPublic, function (err) {
        var note = document.getElementById('identitySaveNote');
        note.textContent = err ? 'Could not save changes.' : 'Saved.';
        note.style.color = err ? '#7a1f1f' : '';
        note.style.display = 'block';
        setTimeout(function () { note.style.display = 'none'; }, 2500);
      });
    });

    window.AVProgressSync.getUser().then(function (user) {
      if (!user) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent('settings.html');
        return;
      }
      var client = window.AVProgressSync.getClient();
      window.AVProgressSync.ensurePlayerRow(user).then(function () {
        return client.from('players').select('display_name, public_profile').eq('user_id', user.id).maybeSingle();
      }).then(function (res) {
        render(user, res && res.data);
      });
    });
  })();
  </script>

  
</body>
</html>
