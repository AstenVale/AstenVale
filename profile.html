<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — The Asten Vale Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1c120a; --ink-faded: #4a3728; --paper: #c9a97a; --paper-dark: #b8935e;
      --gold: #c9960c; --green-pine: #4a7c4e; --folder-red: #7a1f1f; --bg: #0c0a06;
      --font-type: 'Courier Prime', 'Courier New', Courier, monospace;
      --font-header: 'Special Elite', 'Courier New', serif;
    }
    body { background: var(--bg); color: var(--paper); font-family: var(--font-type); min-height: 100vh; }

    
    
    
    
    
    
    

    .hero{text-align:center;padding:2rem 2rem 1rem;}
    .hero-eyebrow{font-size:0.68rem;letter-spacing:0.3em;color:rgba(201,169,122,0.45);text-transform:uppercase;}
    .hero-title{font-family:var(--font-header);font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:0.08em;color:rgba(220,190,140,0.95);text-transform:uppercase;margin-top:0.4rem;}
    .hero-rank{font-size:0.8rem;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;margin-top:0.5rem;}

    .wrap{max-width:640px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.85rem;margin-bottom:2rem;}
    .stat-tile{background:var(--paper);color:var(--ink);padding:1.1rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.35);}
    .stat-tile .num{font-family:var(--font-header);font-size:1.7rem;color:var(--folder-red);}
    .stat-tile .label{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faded);margin-top:0.3rem;}

    .card{background:var(--paper);color:var(--ink);padding:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.35);}
    .field-row{margin-bottom:1rem;}
    .field-label{font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faded);margin-bottom:0.3rem;}
    .field-value{font-family:var(--font-header);font-size:0.95rem;}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid rgba(60,30,10,0.15);}
    .toggle-btn{font-family:var(--font-header);font-size:0.72rem;letter-spacing:0.08em;color:#fff;background:var(--folder-red);padding:0.55rem 1.2rem;border:none;text-transform:uppercase;cursor:pointer;}
    .toggle-btn:hover{background:#8b1a1a;}
    .save-note{font-size:0.7rem;color:var(--green-pine);margin-top:0.6rem;display:none;}

    #loadingNote{text-align:center;padding:4rem 1rem;color:rgba(201,169,122,0.5);font-size:0.8rem;}
  
    
    
    
    
    
    
    
    
    
    
</style>
  <link rel="stylesheet" href="css/game-nav.css" />
</head>
<body>

    <script src="js/game-nav.js"></script>

  <div id="loadingNote">Retrieving your case file&hellip;</div>

  <div id="profileContent" style="display:none;">
    <div class="hero">
      <p class="hero-eyebrow">Investigator Profile</p>
      <h1 class="hero-title" id="detectiveName">Detective</h1>
      <p class="hero-rank" id="detectiveRank">Rookie Investigator</p>
    </div>

    <div class="wrap">
      <div class="stat-grid">
        <div class="stat-tile"><div class="num" id="statCases">0</div><div class="label">Cases Solved</div></div>
        <div class="stat-tile"><div class="num" id="statBadges">0</div><div class="label">Badges Earned</div></div>
        <div class="stat-tile"><div class="num" id="statVaults">0</div><div class="label">Vaults Unlocked</div></div>
      </div>

      <div class="card">
        <div class="field-row">
          <div class="field-label">Email On File</div>
          <div class="field-value" id="profileEmail">&mdash;</div>
        </div>
        <div class="field-row">
          <div class="field-label">Display Name</div>
          <div class="field-value" id="profileDisplayName">Not set</div>
        </div>
        <div class="toggle-row">
          <div>
            <div class="field-label" style="margin-bottom:0;">Public Profile</div>
            <div class="field-value" id="publicStatus" style="font-size:0.75rem;">Off</div>
          </div>
          <a href="settings.html" class="toggle-btn">Edit In Settings</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/vault-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/progress-sync.js"></script>
  <script>
  (function () {
    function rankFor(count) {
      if (count >= 100) return 'Chief Investigator';
      if (count >= 50) return 'Senior Detective';
      if (count >= 20) return 'Detective';
      if (count >= 5) return 'Investigator';
      return 'Rookie Investigator';
    }

    function render(user, progress, player) {
      document.getElementById('loadingNote').style.display = 'none';
      document.getElementById('profileContent').style.display = 'block';

      var name = (player && player.display_name) || (user.user_metadata && user.user_metadata.display_name) || user.email;
      document.getElementById('detectiveName').textContent = name;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileDisplayName').textContent = (player && player.display_name) || 'Not set';
      document.getElementById('publicStatus').textContent = (player && player.public_profile) ? 'On' : 'Off';

      var cases = (progress && progress.completed_cases) || [];
      var badges = (progress && progress.earned_badges) || [];
      var vaults = (progress && progress.unlocked_vaults) || [];

      document.getElementById('detectiveRank').textContent = rankFor(cases.length);
      document.getElementById('statCases').textContent = cases.length;
      document.getElementById('statBadges').textContent = badges.length;
      document.getElementById('statVaults').textContent = vaults.length;
    }

    if (!window.AVProgressSync) {
      document.getElementById('loadingNote').textContent = 'Profile is unavailable right now.';
      return;
    }

    window.AVProgressSync.getUser().then(function (user) {
      if (!user) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent('profile.html');
        return;
      }
      var client = window.AVProgressSync.getClient();
      Promise.all([
        window.AVProgressSync.getSupabaseProgress(user),
        client ? client.from('players').select('display_name, public_profile').eq('user_id', user.id).maybeSingle().then(function (res) { return res.data; }) : Promise.resolve(null)
      ]).then(function (results) {
        render(user, results[0], results[1]);
      });
    });
  })();
  </script>

  
</body>
</html>
