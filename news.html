<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News — The Asten Vale Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --ink:         #1c120a;
      --ink-faded:   #4a3728;
      --paper:       #c9a97a;
      --paper-dark:  #b8935e;
      --gold:        #c9960c;
      --bg:          #0c0a06;
      --font-type:   'Courier Prime', 'Courier New', Courier, monospace;
      --font-header: 'Special Elite', 'Courier New', serif;
    }

    body {
      background: var(--bg);
      color: var(--paper);
      font-family: var(--font-type);
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    .site-nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2.5rem;
    }

    .nav-brand {
      font-family: var(--font-header);
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      color: rgba(201,169,122,0.75);
      text-transform: uppercase;
      line-height: 1.3;
    }
    .nav-brand span { display: block; }

    .nav-logo { position: absolute; left: 50%; transform: translateX(-50%); }
    .nav-logo svg { width: 46px; height: 46px; opacity: 0.9; }

    .nav-links { display: flex; gap: 1.75rem; align-items: center; flex-wrap: wrap; }

    .nav-link {
      font-family: var(--font-type);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: rgba(201,169,122,0.7);
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }
    .nav-link:hover { color: var(--paper); }
    .nav-link.active { color: rgba(201,169,122,0.95); }
    .nav-link.active::after {
      content: "";
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 1px;
      background: rgba(201,169,122,0.6);
    }

    .coming-soon {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
    }

    .coming-soon-label {
      font-family: var(--font-type);
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      color: rgba(201,169,122,0.5);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .coming-soon-title {
      font-family: var(--font-header);
      font-size: clamp(1.8rem, 6vw, 3rem);
      letter-spacing: 0.1em;
      color: rgba(220,190,140,0.95);
      text-transform: uppercase;
      text-shadow: 0 2px 30px rgba(0,0,0,0.8);
      margin-bottom: 1.25rem;
    }

    .coming-soon-rule { width: 40px; height: 1px; background: rgba(201,169,122,0.3); margin: 0 auto 1.25rem; }

    .coming-soon-sub {
      font-size: 0.85rem;
      color: rgba(201,169,122,0.55);
      font-style: italic;
    }

    .site-footer {
      background: var(--bg);
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(201,169,122,0.08);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-motto { display: flex; align-items: center; gap: 0.85rem; }
    .footer-motto svg { opacity: 0.55; flex-shrink: 0; }
    .footer-motto-text {
      font-family: var(--font-header);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: rgba(201,169,122,0.45);
      text-transform: uppercase;
      line-height: 1.4;
    }
    .footer-copy {
      font-family: var(--font-type);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(201,169,122,0.3);
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .site-nav { padding: 1rem 1.25rem; }
      .site-footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
      <a href="index.html" class="nav-brand">
        <span>Asten Vale</span>
        <span>Archives</span>
      </a>
      <div class="nav-logo">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="28" stroke="rgba(201,169,122,0.6)" stroke-width="1.2"/>
          <circle cx="30" cy="30" r="22" stroke="rgba(201,169,122,0.35)" stroke-width="0.8"/>
          <line x1="30" y1="4" x2="30" y2="10" stroke="rgba(201,169,122,0.7)" stroke-width="1.5"/>
          <polygon points="30,13 23,26 37,26" fill="rgba(201,169,122,0.82)"/>
          <polygon points="30,18 21,33 39,33" fill="rgba(201,169,122,0.82)"/>
          <rect x="27" y="33" width="6" height="5" fill="rgba(201,169,122,0.7)"/>
          <line x1="30" y1="50" x2="30" y2="56" stroke="rgba(201,169,122,0.5)" stroke-width="1"/>
          <line x1="4" y1="30" x2="10" y2="30" stroke="rgba(201,169,122,0.5)" stroke-width="1"/>
          <line x1="50" y1="30" x2="56" y2="30" stroke="rgba(201,169,122,0.5)" stroke-width="1"/>
        </svg>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="music.html" class="nav-link">Music</a>
        <a href="join.html" class="nav-link">Join</a>
        <a href="news.html" class="nav-link active">News</a>
        <a href="login.html" class="nav-link nav-cta">Begin Investigation</a>
      </div>
    </nav>

  <div class="coming-soon">
    <p class="coming-soon-label">Asten Vale Archives</p>
    <h1 class="coming-soon-title">News from the archive coming soon.</h1>
    <div class="coming-soon-rule"></div>
    <p class="coming-soon-sub">Recovered dispatches will be indexed here.</p>
  </div>

  <footer class="site-footer">
    <div class="footer-motto">
      <svg width="28" height="28" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="27" stroke="rgba(201,169,122,0.5)" stroke-width="1.2"/>
        <polygon points="30,10 25,22 35,22" fill="rgba(201,169,122,0.6)"/>
        <polygon points="30,16 21,30 39,30" fill="rgba(201,169,122,0.6)"/>
        <rect x="27" y="30" width="6" height="5" fill="rgba(201,169,122,0.55)"/>
      </svg>
      <span class="footer-motto-text">Truth is not given.<br>It is discovered.</span>
    </div>
    <span class="footer-copy">© 2026 Asten Vale Archives</span>
  </footer>

</body>
</html>
