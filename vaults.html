<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaults — The Asten Vale Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1c120a; --ink-faded: #4a3728; --paper: #c9a97a; --paper-dark: #b8935e;
      --gold: #c9960c; --green-pine: #4a7c4e; --folder-red: #7a1f1f; --bg: #0c0a06;
      --font-type: 'Courier Prime', 'Courier New', Courier, monospace;
      --font-header: 'Special Elite', 'Courier New', serif;
    }
    body { background: var(--bg); color: var(--paper); font-family: var(--font-type); min-height: 100vh; }

    
    
    
    
    
    
    

    .hero{text-align:center;padding:2rem 2rem 1rem;}
    .hero-eyebrow{font-size:0.68rem;letter-spacing:0.3em;color:rgba(201,169,122,0.45);text-transform:uppercase;}
    .hero-title{font-family:var(--font-header);font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:0.08em;color:rgba(220,190,140,0.95);text-transform:uppercase;margin-top:0.4rem;}

    .wrap{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
    .vault-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;}
    .vault-card{background:var(--paper);color:var(--ink);padding:1.25rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.35);position:relative;}
    .vault-card.locked{cursor:pointer;}
    .vault-card.locked::after{content:'CLASSIFIED';position:absolute;top:0.6rem;right:0.6rem;font-size:0.6rem;letter-spacing:0.08em;color:var(--ink-faded);border:1px solid rgba(60,30,10,0.3);padding:0.15rem 0.4rem;}
    .vault-card.current{cursor:pointer;border:2px solid var(--gold);}
    .vault-card.current::after{content:'IN PROGRESS';position:absolute;top:0.6rem;right:0.6rem;font-size:0.6rem;letter-spacing:0.08em;color:#fff;background:var(--gold);padding:0.15rem 0.4rem;}
    .vault-symbol{font-size:2rem;margin-bottom:0.4rem;}
    .vault-name{font-family:var(--font-header);font-size:0.95rem;letter-spacing:0.05em;text-transform:uppercase;}
    .vault-status{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;margin-top:0.4rem;color:var(--ink-faded);}
    .vault-card.unlocked .vault-status{color:var(--green-pine);}
    .vault-lore{font-size:0.72rem;font-style:italic;color:var(--ink-faded);margin-top:0.6rem;line-height:1.5;}
    .vault-detail{display:none;text-align:left;margin-top:0.75rem;padding-top:0.6rem;border-top:1px solid rgba(60,30,10,0.2);font-size:0.72rem;line-height:1.6;}
    .vault-detail.open{display:block;}
    .vault-detail-row{display:flex;justify-content:space-between;gap:0.5rem;}
    .vault-detail-label{color:var(--ink-faded);text-transform:uppercase;letter-spacing:0.06em;font-size:0.62rem;}
    .vault-detail-requirement{margin-top:0.4rem;font-style:italic;color:var(--ink-faded);}

    .empty-note{font-size:0.8rem;color:rgba(201,169,122,0.5);font-style:italic;text-align:center;padding:1rem 0;}
    #loadingNote{text-align:center;padding:4rem 1rem;color:rgba(201,169,122,0.5);font-size:0.8rem;}

    /* ── Progress summary ─────────────────────────────────────────────── */
    .progress-summary{background:rgba(201,169,122,0.06);border:1px solid rgba(201,169,122,0.2);border-radius:4px;padding:1.1rem 1.25rem;margin-bottom:2rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.9rem;}
    .progress-summary-item .label{font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(201,169,122,0.6);}
    .progress-summary-item .val{display:block;margin-top:0.25rem;font-family:var(--font-header);font-size:1.1rem;letter-spacing:0.04em;color:var(--gold);text-transform:uppercase;}

    /* ── Section headings ─────────────────────────────────────────────── */
    .vault-section{margin-bottom:2.25rem;}
    .vault-section-heading{font-family:var(--font-header);font-size:0.85rem;letter-spacing:0.15em;color:rgba(201,169,122,0.6);text-transform:uppercase;margin-bottom:0.85rem;padding-bottom:0.4rem;border-bottom:1px solid rgba(201,169,122,0.2);}

    /* ── Next vault (medium card) ─────────────────────────────────────── */
    .vault-card.next-vault{max-width:280px;margin:0 auto;padding:1rem;}
    .vault-card.next-vault .vault-symbol{font-size:1.5rem;}
    .vault-card.next-vault .vault-name{font-size:0.85rem;}

    /* ── Compact archive rows (completed + sealed) ────────────────────── */
    .vault-row-list{display:flex;flex-direction:column;}
    .vault-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0.65rem 0;border-bottom:1px solid rgba(201,169,122,0.15);}
    .vault-row-left{display:flex;align-items:center;gap:0.65rem;min-width:0;}
    .vault-row-icon{flex-shrink:0;font-size:0.85rem;}
    .vault-row-name{font-size:0.8rem;letter-spacing:0.05em;overflow-wrap:anywhere;}
    .vault-row.completed .vault-row-name{color:rgba(220,190,140,0.9);}
    .vault-row-view-btn{font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(201,169,122,0.7);background:none;border:none;padding:0;margin-top:0.2rem;cursor:pointer;font-family:inherit;text-align:left;}
    .vault-row-view-btn:hover{color:var(--paper);}
    .vault-row-lore{display:none;font-size:0.7rem;font-style:italic;color:rgba(201,169,122,0.55);margin-top:0.4rem;line-height:1.5;}
    .vault-row-lore.open{display:block;}
    .vault-row-body{display:flex;flex-direction:column;min-width:0;}
    .vault-row-empty{font-size:0.75rem;font-style:italic;color:rgba(201,169,122,0.45);padding:0.5rem 0;}
    .vault-row-reward{font-size:0.68rem;letter-spacing:0.05em;margin-top:0.3rem;}
    .vault-row-reward a{color:var(--gold);text-decoration:underline;text-underline-offset:2px;}
    .vault-row-reward.pending{color:rgba(201,169,122,0.4);font-style:italic;}
    .vault-footer-note{text-align:center;font-size:0.72rem;font-style:italic;letter-spacing:0.06em;color:rgba(201,169,122,0.4);margin-top:1.5rem;}

    /* ── Current vault progress bar ───────────────────────────────────── */
    .vault-progress-track{background:rgba(60,30,10,0.15);border-radius:3px;height:8px;overflow:hidden;margin-top:0.6rem;}
    .vault-progress-fill{background:var(--folder-red);height:100%;border-radius:3px;transition:width 0.3s;}
    .vault-progress-count{font-size:0.68rem;letter-spacing:0.06em;color:var(--ink-faded);margin-top:0.35rem;}
  
    
    
    
    
    
    
    
    
    
    
</style>
  <link rel="stylesheet" href="css/game-nav.css" />
</head>
<body>

  <!-- ── AUTH GATE (see case.html for the original / fuller comment) ── -->
  <div id="authGate" style="position:fixed;inset:0;z-index:99999;background:#0c0a06;display:flex;align-items:center;justify-content:center;font-family:'Courier Prime','Courier New',monospace;color:rgba(201,169,122,0.7);font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;">
    Verifying investigator credentials&hellip;
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/progress-sync.js"></script>
  <script>
  (function () {
    var gate = document.getElementById('authGate');
    function unlock() { if (gate) gate.remove(); }
    if (!window.AVProgressSync) { unlock(); return; }
    window.AVProgressSync.getUser().then(function (user) {
      if (user) { unlock(); return; }
      var here = window.location.pathname.split('/').pop() + window.location.search;
      window.location.href = 'login.html?redirect=' + encodeURIComponent(here);
    }).catch(function () { unlock(); });
  })();
  </script>
  <!-- ── END AUTH GATE ── -->

    <script src="js/game-nav.js"></script>

  <div id="loadingNote">Retrieving vault status&hellip;</div>

  <div id="vaultsContent" style="display:none;">
    <div class="hero">
      <p class="hero-eyebrow">Sealed Records</p>
      <h1 class="hero-title">Vaults</h1>
    </div>

    <div class="wrap">
      <div class="progress-summary" id="progressSummary"></div>

      <div class="vault-section" id="currentVaultSection" style="display:none;">
        <div class="vault-section-heading">Current Vault</div>
        <div class="vault-grid" id="currentVaultGrid"></div>
      </div>

      <div class="vault-section" id="nextVaultSection" style="display:none;">
        <div class="vault-section-heading">Next Vault</div>
        <div class="vault-grid" id="nextVaultGrid"></div>
      </div>

      <div class="vault-section" id="completedVaultsSection" style="display:none;">
        <div class="vault-section-heading">Unlocked Vaults</div>
        <div class="vault-row-list" id="completedVaultsList"></div>
      </div>

      <p class="vault-footer-note" id="vaultsFooterNote" style="display:none;">More sealed records await&hellip;</p>

      <p class="empty-note" id="vaultsEmptyNote" style="display:none;"></p>
    </div>
  </div>

  <script src="js/vault-config.js"></script>
  <script>
  (function () {
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    // Backend remains the source of truth throughout: "completed" comes
    // from player_progress.unlocked_vaults (set server-side when a season
    // is fully solved), and per-season progress/denominators use
    // player_progress.completed_cases against public_released_cases --
    // never the static SEASONS_CONFIG.released flag. Only the visibility
    // rule (which vaults get rendered at all) is new here.
    function releasedCases(season, releasedIds) {
      return season.cases.filter(function (c) { return releasedIds.indexOf(c.id) !== -1; });
    }

    function buildVaultCard(season, releasedIds, solved, isCompleted, isCurrent, extraClass) {
      var vault = season.vault;
      var released = releasedCases(season, releasedIds);
      var solvedCount = released.filter(function (c) { return solved.indexOf(c.id) !== -1; }).length;
      var totalCount = released.length;

      var card = document.createElement('div');
      var stateClass = isCompleted ? 'unlocked' : (isCurrent ? 'current' : 'locked');
      card.className = 'vault-card ' + stateClass + (extraClass ? ' ' + extraClass : '');
      card.dataset.vaultId = vault.id;

      var statusText = isCompleted ? 'Unlocked' : (isCurrent ? 'In Progress' : 'Locked');
      var pct = totalCount ? Math.round((solvedCount / totalCount) * 100) : 0;
      // Story names only render for completed/current vaults -- the "next"
      // vault card is built with a number-only placeholder name by the
      // caller, so this function itself never has to guess what's safe
      // to reveal.

      card.innerHTML =
        '<div class="vault-symbol">' + (isCompleted ? '&#128274;&#65039;' : '&#128272;') + '</div>' +
        '<div class="vault-name">' + esc(vault.name) + '</div>' +
        '<div class="vault-status">' + statusText + '</div>' +
        (isCompleted ? '<div class="vault-lore">' + esc(vault.lore) + '</div>' : '') +
        (isCurrent
          ? '<div class="vault-progress-count">' + solvedCount + ' / ' + totalCount + ' Cases</div>' +
            '<div class="vault-progress-track"><div class="vault-progress-fill" style="width:' + pct + '%"></div></div>'
          : '') +
        (!isCompleted
          ? '<div class="vault-detail">' +
              '<div class="vault-detail-row"><span class="vault-detail-label">Required Series</span><span>' + esc(season.title) + '</span></div>' +
              '<div class="vault-detail-row"><span class="vault-detail-label">Progress</span><span>' + solvedCount + ' / ' + totalCount + '</span></div>' +
              '<div class="vault-detail-requirement">Solve every released case in ' + esc(season.title) + ' to unlock this vault.</div>' +
            '</div>'
          : '');

      if (!isCompleted) {
        card.addEventListener('click', function () {
          var detail = card.querySelector('.vault-detail');
          if (detail) detail.classList.toggle('open');
        });
      }

      return { card: card, solvedCount: solvedCount, totalCount: totalCount };
    }

    function render(progress, releasedIds, vaultRewards) {
      document.getElementById('loadingNote').style.display = 'none';
      document.getElementById('vaultsContent').style.display = 'block';

      var solved = (progress && progress.completed_cases) || [];
      var unlockedVaultIds = {};
      ((progress && progress.unlocked_vaults) || []).forEach(function (id) { unlockedVaultIds[id] = true; });

      var currentSection   = document.getElementById('currentVaultSection');
      var currentGrid      = document.getElementById('currentVaultGrid');
      var nextSection      = document.getElementById('nextVaultSection');
      var nextGrid         = document.getElementById('nextVaultGrid');
      var completedSection = document.getElementById('completedVaultsSection');
      var completedList    = document.getElementById('completedVaultsList');
      var footerNote        = document.getElementById('vaultsFooterNote');
      var emptyNote          = document.getElementById('vaultsEmptyNote');

      if (typeof SEASONS_CONFIG === 'undefined') {
        emptyNote.textContent = 'This archive section is being indexed.';
        emptyNote.style.display = 'block';
        return;
      }

      var seasonsWithVaults = SEASONS_CONFIG.filter(function (s) { return !!s.vault; });

      // player_vault_rewards already only ever contains rows for vaults
      // this signed-in player has unlocked AND that are released = true
      // with a real reward_url (enforced server-side by the view + RLS --
      // see supabase/vault_rewards_migration.sql). Keyed by vault number
      // (1-based, matching "Vault 01" etc. elsewhere on this page) purely
      // for O(1) lookup while rendering rows below.
      var rewardsByVault = {};
      (vaultRewards || []).forEach(function (r) { rewardsByVault[r.vault] = r; });

      // "Current" is the first season whose vault isn't completed yet.
      // "Next" is the one right after it. This page is a teaser, not a
      // full index -- anything beyond "next" is never rendered at all,
      // not even as a compact row.
      var currentIndex = seasonsWithVaults.findIndex(function (s) { return !unlockedVaultIds[s.vault.id]; });
      if (currentIndex === -1) currentIndex = seasonsWithVaults.length; // all completed

      var totalCasesSolved = solved.length;
      var totalCasesOverall = 0;
      seasonsWithVaults.forEach(function (s) { totalCasesOverall += s.cases.length; });

      var completedCount = 0;
      var currentCasesInfo = null;
      // The next vault's requirement is framed around finishing the season
      // tied to the *current* vault -- that's what actually stands between
      // the player and the next investigation, not the next vault's own
      // (still-hidden) season.
      var currentSeasonTitle = currentIndex < seasonsWithVaults.length ? seasonsWithVaults[currentIndex].title : null;

      seasonsWithVaults.forEach(function (season, i) {
        var isCompleted = i < currentIndex;
        var isCurrent = i === currentIndex;
        var isNext = i === currentIndex + 1;
        var vault = season.vault;

        if (isCompleted) {
          completedCount++;
          var vaultNum = i + 1;
          var reward = rewardsByVault[vaultNum];
          var row = document.createElement('div');
          row.className = 'vault-row completed';
          row.innerHTML =
            '<span class="vault-row-left"><span class="vault-row-icon">&#10003;</span>' +
            '<span class="vault-row-body">' +
              '<span class="vault-row-name"></span>' +
              '<button type="button" class="vault-row-view-btn">Open Vault</button>' +
              '<span class="vault-row-lore"></span>' +
              '<span class="vault-row-reward"></span>' +
            '</span></span>';
          row.querySelector('.vault-row-name').textContent = vault.name;
          row.querySelector('.vault-row-lore').textContent = vault.lore || '';
          row.querySelector('.vault-row-view-btn').addEventListener('click', function () {
            row.querySelector('.vault-row-lore').classList.toggle('open');
          });
          var rewardEl = row.querySelector('.vault-row-reward');
          if (reward && reward.reward_url) {
            var link = document.createElement('a');
            link.href = reward.reward_url;
            link.target = '_blank';
            link.rel = 'noopener';
            link.textContent = 'Open Reward';
            link.addEventListener('click', function () {
              if (window.AVVaultRewardClaim) window.AVVaultRewardClaim.markClaimed(vaultNum);
            });
            rewardEl.appendChild(link);
          } else {
            rewardEl.classList.add('pending');
            rewardEl.textContent = 'Reward pending';
          }
          completedList.appendChild(row);
          return;
        }

        if (isCurrent) {
          var built = buildVaultCard(season, releasedIds, solved, false, true, '');
          currentCasesInfo = { solved: built.solvedCount, total: built.totalCount, name: vault.name };
          currentGrid.appendChild(built.card);
          currentSection.style.display = 'block';
          return;
        }

        if (isNext) {
          // Medium card: number + locked state + unlock requirement only.
          // Story name stays hidden -- "Classified" is shown in its place.
          var numStr = (i + 1 < 10 ? '0' : '') + (i + 1);
          var requirementText = currentSeasonTitle
            ? 'Complete ' + esc(currentSeasonTitle) + ' to reveal.'
            : 'Complete the current investigation to reveal.';
          var card = document.createElement('div');
          card.className = 'vault-card locked next-vault';
          card.innerHTML =
            '<div class="vault-symbol">&#128272;</div>' +
            '<div class="vault-name">Vault ' + numStr + '</div>' +
            '<div class="vault-status">Classified</div>' +
            '<div class="vault-detail-requirement">' + requirementText + '</div>';
          nextGrid.appendChild(card);
          nextSection.style.display = 'block';
          return;
        }

        // Everything beyond "next" is intentionally not rendered -- this
        // page is a teaser (current + next + unlocked), not a full index
        // of all 50 vaults.
      });

      if (!completedList.children.length) {
        var noneRow = document.createElement('div');
        noneRow.className = 'vault-row-empty';
        noneRow.textContent = 'None';
        completedList.appendChild(noneRow);
      }
      completedSection.style.display = 'block';

      var hasVaultsBeyondNext = seasonsWithVaults.length > currentIndex + 2;
      if (hasVaultsBeyondNext) { footerNote.style.display = 'block'; }

      // ── Progress summary ────────────────────────────────────────────
      var summaryEl = document.getElementById('progressSummary');
      var currentVaultLabel = currentCasesInfo ? currentCasesInfo.name : 'All Vaults Recovered';
      var casesTowardCurrent = currentCasesInfo ? (currentCasesInfo.solved + ' / ' + currentCasesInfo.total) : (seasonsWithVaults.length ? '0 / 0' : '—');
      summaryEl.innerHTML =
        '<div class="progress-summary-item"><span class="label">Vaults Completed</span><span class="val">' + completedCount + ' / ' + seasonsWithVaults.length + '</span></div>' +
        '<div class="progress-summary-item"><span class="label">Current Vault</span><span class="val"></span></div>' +
        '<div class="progress-summary-item"><span class="label">Cases Toward Current Vault</span><span class="val">' + casesTowardCurrent + '</span></div>' +
        '<div class="progress-summary-item"><span class="label">Overall Cases Solved</span><span class="val">' + totalCasesSolved + ' / ' + totalCasesOverall + '</span></div>';
      summaryEl.querySelectorAll('.progress-summary-item .val')[1].textContent = currentVaultLabel;

      if (!seasonsWithVaults.length) {
        emptyNote.textContent = 'This archive section is being indexed.';
        emptyNote.style.display = 'block';
      }
    }

    if (!window.AVProgressSync) {
      document.getElementById('loadingNote').textContent = 'Vaults are unavailable right now.';
      return;
    }

    function getReleasedCaseIds() {
      var client = window.AVProgressSync.getClient();
      if (!client) return Promise.resolve([]);
      return client.from('public_released_cases').select('case_id').then(function (res) {
        if (res.error || !res.data) return [];
        return res.data.map(function (r) { return r.case_id; });
      });
    }

    // player_vault_rewards is a per-player view (RLS + unlock join, see
    // supabase/vault_rewards_migration.sql) -- it can only ever return
    // rewards for vaults this signed-in player has already unlocked, and
    // only once released = true. A read failure here degrades to "no
    // rewards shown" rather than breaking the rest of the page.
    function getVaultRewards() {
      var client = window.AVProgressSync.getClient();
      if (!client) return Promise.resolve([]);
      return client.from('player_vault_rewards').select('vault, reward_title, reward_url').then(function (res) {
        if (res.error || !res.data) return [];
        return res.data;
      });
    }

    window.AVProgressSync.getUser().then(function (user) {
      if (!user) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent('vaults.html');
        return;
      }
      Promise.all([
        window.AVProgressSync.getSupabaseProgress(user),
        getReleasedCaseIds(),
        getVaultRewards()
      ]).then(function (results) {
        render(results[0], results[1], results[2]);
      });
    });
  })();
  </script>

  <script src="js/vault-reward-popup.js"></script>
</body>
</html>
