<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaults — The Asten Vale Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1c120a; --ink-faded: #4a3728; --paper: #c9a97a; --paper-dark: #b8935e;
      --gold: #c9960c; --green-pine: #4a7c4e; --folder-red: #7a1f1f; --bg: #0c0a06;
      --font-type: 'Courier Prime', 'Courier New', Courier, monospace;
      --font-header: 'Special Elite', 'Courier New', serif;
    }
    body { background: var(--bg); color: var(--paper); font-family: var(--font-type); min-height: 100vh; }

    .site-nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.5rem;flex-wrap:wrap;gap:0.75rem;}
    .nav-brand{font-family:var(--font-header);font-size:0.75rem;letter-spacing:0.22em;color:rgba(201,169,122,0.75);text-decoration:none;text-transform:uppercase;line-height:1.3;}
    .nav-brand span{display:block;}
    .nav-links{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;}
    .nav-link{font-family:var(--font-type);font-size:0.7rem;letter-spacing:0.14em;color:rgba(201,169,122,0.7);text-decoration:none;text-transform:uppercase;}
    .nav-link:hover,.nav-link.active{color:var(--paper);}
    .nav-link.logout{color:rgba(122,31,31,0.75);cursor:pointer;}

    .hero{text-align:center;padding:2rem 2rem 1rem;}
    .hero-eyebrow{font-size:0.68rem;letter-spacing:0.3em;color:rgba(201,169,122,0.45);text-transform:uppercase;}
    .hero-title{font-family:var(--font-header);font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:0.08em;color:rgba(220,190,140,0.95);text-transform:uppercase;margin-top:0.4rem;}

    .wrap{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
    .vault-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;}
    .vault-card{background:var(--paper);color:var(--ink);padding:1.25rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.35);}
    .vault-card.locked{opacity:0.45;filter:grayscale(0.5);}
    .vault-symbol{font-size:2rem;margin-bottom:0.4rem;}
    .vault-name{font-family:var(--font-header);font-size:0.95rem;letter-spacing:0.05em;text-transform:uppercase;}
    .vault-status{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;margin-top:0.4rem;color:var(--ink-faded);}
    .vault-card.unlocked .vault-status{color:var(--green-pine);}
    .vault-lore{font-size:0.72rem;font-style:italic;color:var(--ink-faded);margin-top:0.6rem;line-height:1.5;}

    .empty-note{font-size:0.8rem;color:rgba(201,169,122,0.5);font-style:italic;text-align:center;padding:1rem 0;}
    #loadingNote{text-align:center;padding:4rem 1rem;color:rgba(201,169,122,0.5);font-size:0.8rem;}
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-brand">
      <span>Asten Vale</span>
      <span>Archives</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="archive.html" class="nav-link">Archive</a>
      <a href="cabinet.html" class="nav-link">Case Files</a>
      <a href="evidence.html" class="nav-link">Evidence</a>
      <a href="vaults.html" class="nav-link active">Vaults</a>
      <a href="progress.html" class="nav-link">Progress</a>
      <a href="achievements.html" class="nav-link">Achievements</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <a href="settings.html" class="nav-link">Settings</a>
      <span class="nav-link logout" id="logoutLink">Logout</span>
    </div>
  </nav>

  <div id="loadingNote">Retrieving vault status&hellip;</div>

  <div id="vaultsContent" style="display:none;">
    <div class="hero">
      <p class="hero-eyebrow">Sealed Records</p>
      <h1 class="hero-title">Vaults</h1>
    </div>

    <div class="wrap">
      <div class="vault-grid" id="vaultGrid"></div>
    </div>
  </div>

  <script src="js/vault-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/progress-sync.js"></script>
  <script>
  (function () {
    function render(progress) {
      document.getElementById('loadingNote').style.display = 'none';
      document.getElementById('vaultsContent').style.display = 'block';

      var unlocked = {};
      ((progress && progress.unlocked_vaults) || []).forEach(function (id) { unlocked[id] = true; });

      var grid = document.getElementById('vaultGrid');

      if (typeof SEASONS_CONFIG === 'undefined') {
        grid.innerHTML = '<p class="empty-note">This archive section is being indexed.</p>';
        return;
      }

      SEASONS_CONFIG.forEach(function (season) {
        var vault = season.vault;
        if (!vault) return;
        var isUnlocked = !!unlocked[vault.id];

        var card = document.createElement('div');
        card.className = 'vault-card ' + (isUnlocked ? 'unlocked' : 'locked');
        card.innerHTML =
          '<div class="vault-symbol">' + (isUnlocked ? '&#128274;&#65039;' : '&#128272;') + '</div>' +
          '<div class="vault-name">' + vault.name + '</div>' +
          '<div class="vault-status">' + (isUnlocked ? 'Unlocked' : 'Locked') + '</div>' +
          (isUnlocked ? '<div class="vault-lore">' + vault.lore + '</div>' : '');
        grid.appendChild(card);
      });

      if (!grid.children.length) {
        grid.innerHTML = '<p class="empty-note">This archive section is being indexed.</p>';
      }
    }

    if (!window.AVProgressSync) {
      document.getElementById('loadingNote').textContent = 'Vaults are unavailable right now.';
      return;
    }

    document.getElementById('logoutLink').addEventListener('click', function () {
      window.AVProgressSync.signOut(function () { window.location.href = 'index.html'; });
    });

    window.AVProgressSync.getUser().then(function (user) {
      if (!user) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent('vaults.html');
        return;
      }
      window.AVProgressSync.getSupabaseProgress(user).then(function (progress) {
        render(progress);
      });
    });
  })();
  </script>
</body>
</html>
