<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achievements — The Asten Vale Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1c120a; --ink-faded: #4a3728; --paper: #c9a97a; --paper-dark: #b8935e;
      --gold: #c9960c; --green-pine: #4a7c4e; --folder-red: #7a1f1f; --bg: #0c0a06; --paper-bg: #c4a472;
      --font-type: 'Courier Prime', 'Courier New', Courier, monospace;
      --font-header: 'Special Elite', 'Courier New', serif;
    }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-type); min-height: 100vh; }

    .page-hero { position: relative; min-height: 30vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 2rem 3rem; }
    .page-hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(245,166,35,0.04) 0%, transparent 70%); pointer-events: none; }
    .page-eyebrow { font-family: var(--font-type); font-size: 0.65rem; letter-spacing: 0.32em; color: rgba(201,169,122,0.4); text-transform: uppercase; margin-bottom: 0.4rem; position: relative; }
    .page-title { font-family: var(--font-header); font-size: clamp(1.8rem, 5vw, 3rem); letter-spacing: 0.12em; color: rgba(220,190,140,0.95); text-transform: uppercase; text-shadow: 0 2px 30px rgba(0,0,0,0.8); margin-bottom: 0.75rem; position: relative; }
    .page-rule { width: 40px; height: 1px; background: rgba(201,169,122,0.3); margin: 0 auto 0.75rem; }

    .paper-section { background: var(--paper-bg); position: relative; }
    .paper-section::before { content: ""; display: block; height: 28px; background: var(--paper-bg); clip-path: polygon(0% 100%, 1% 20%, 2.5% 90%, 4% 10%, 5.5% 80%, 7% 5%, 8.5% 85%, 10% 15%, 11.5% 75%, 13% 25%, 14.5% 70%, 16% 30%, 17.5% 65%, 19% 20%, 20.5% 80%, 22% 10%, 23.5% 90%, 25% 15%, 26.5% 75%, 28% 35%, 29.5% 60%, 31% 25%, 32.5% 70%, 34% 10%, 35.5% 85%, 37% 20%, 38.5% 75%, 40% 30%, 41.5% 65%, 43% 15%, 44.5% 80%, 46% 20%, 47.5% 70%, 49% 10%, 50.5% 90%, 52% 25%, 53.5% 60%, 55% 15%, 56.5% 80%, 58% 30%, 59.5% 65%, 61% 10%, 62.5% 85%, 64% 20%, 65.5% 75%, 67% 35%, 68.5% 60%, 70% 15%, 71.5% 80%, 73% 25%, 74.5% 70%, 76% 10%, 77.5% 90%, 79% 20%, 80.5% 65%, 82% 30%, 83.5% 75%, 85% 15%, 86.5% 80%, 88% 25%, 89.5% 60%, 91% 10%, 92.5% 85%, 94% 20%, 95.5% 70%, 97% 30%, 98.5% 80%, 100% 0%, 100% 100%); }

    .site-footer { background: var(--bg); padding: 1.5rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(201,169,122,0.08); }
    .footer-motto { display: flex; align-items: center; gap: 0.85rem; }
    .footer-motto svg { opacity: 0.55; flex-shrink: 0; }
    .footer-motto-text { font-family: var(--font-header); font-size: 0.68rem; letter-spacing: 0.18em; color: rgba(201,169,122,0.45); text-transform: uppercase; line-height: 1.4; }
    @media (max-width: 640px) { .site-footer { flex-direction: column; gap: 1rem; text-align: center; } .footer-motto { justify-content: center; } }

    
    
    
    
    
    
    

    .wrap{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
    .progress-summary{background:rgba(0,0,0,0.04);border:1px solid rgba(60,30,10,0.2);border-radius:4px;padding:1.1rem 1.25rem;margin-bottom:2rem;}
    .progress-summary-row{display:flex;justify-content:space-between;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-faded);padding:0.3rem 0;}
    .progress-summary-row .val{color:var(--ink);font-weight:600;}
    .progress-summary-current{margin-top:0.5rem;padding-top:0.6rem;border-top:1px solid rgba(60,30,10,0.15);font-size:0.7rem;letter-spacing:0.15em;color:var(--ink-faded);text-transform:uppercase;}
    .progress-summary-current .val{display:block;margin-top:0.25rem;font-family:var(--font-header);font-size:0.95rem;letter-spacing:0.08em;color:var(--folder-red);text-transform:uppercase;}
    .vault-status-icon{margin-right:0.5rem;}
    .vault-total-note{text-align:center;font-size:0.68rem;letter-spacing:0.15em;color:var(--ink-faded);text-transform:uppercase;margin-top:1.5rem;}

    .archive-vaults-heading{font-family:var(--font-header);font-size:0.85rem;letter-spacing:0.15em;color:var(--ink-faded);text-transform:uppercase;margin:1.75rem 0 0.6rem;padding-top:1.25rem;border-top:1px solid rgba(60,30,10,0.2);}
    .vault-locked-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0.55rem 0;border-bottom:1px solid rgba(60,30,10,0.12);opacity:0.5;}
    .vault-locked-row .vault-title{font-size:0.78rem;letter-spacing:0.08em;}
    .vault-lock-icon{font-size:0.75rem;color:var(--ink-faded);flex-shrink:0;}

    .badge-group{margin-bottom:2.25rem;}
    .badge-group-title{font-family:var(--font-header);font-size:1rem;letter-spacing:0.1em;color:var(--ink);text-transform:uppercase;margin-bottom:0.85rem;padding-bottom:0.4rem;border-bottom:1px solid rgba(60,30,10,0.2);}
    .badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.85rem;}

    .vault-group{margin-bottom:1rem;border-bottom:1px solid rgba(60,30,10,0.2);}
    .vault-summary{display:flex;align-items:center;justify-content:space-between;gap:1rem;cursor:pointer;list-style:none;padding-bottom:0.85rem;-webkit-tap-highlight-color:transparent;}
    .vault-summary::-webkit-details-marker{display:none;}
    .vault-summary-left{display:flex;align-items:center;gap:0.7rem;min-width:0;}
    .vault-caret{font-size:0.7rem;color:var(--ink-faded);transition:transform 0.15s;flex-shrink:0;}
    .vault-group[open] .vault-caret{transform:rotate(90deg);}
    .vault-title{font-family:var(--font-header);font-size:1rem;letter-spacing:0.1em;color:var(--ink);text-transform:uppercase;overflow-wrap:anywhere;}
    .vault-count{font-size:0.7rem;letter-spacing:0.06em;color:var(--ink-faded);white-space:nowrap;flex-shrink:0;}
    .vault-count.complete{color:var(--folder-red);}
    .vault-group .badge-grid{margin-top:0.9rem;padding-bottom:1rem;}
    .badge-card{background:var(--paper);color:var(--ink);padding:1.1rem 0.9rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.35);position:relative;}
    .badge-card.locked{border:1px dashed rgba(60,30,10,0.3);}
    .badge-card.locked::after{content:'LOCKED';position:absolute;top:0.5rem;right:0.5rem;font-size:0.55rem;letter-spacing:0.08em;color:var(--ink-faded);}
    .badge-symbol{font-size:2rem;}
    .badge-name{font-family:var(--font-header);font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;margin-top:0.3rem;}
    .badge-desc{font-size:0.65rem;color:var(--ink-faded);font-style:italic;margin-top:0.35rem;line-height:1.5;}

    .empty-note{font-size:0.8rem;color:var(--ink-faded);font-style:italic;text-align:center;padding:1rem 0;}
    #loadingNote{text-align:center;padding:4rem 1rem;color:rgba(201,169,122,0.5);font-size:0.8rem;}
  
    
    
    
    
    
    
    
    
    
    
</style>
  <link rel="stylesheet" href="css/game-nav.css" />
</head>
<body>

    <script src="js/game-nav.js"></script>

  <div id="loadingNote">Retrieving your achievements&hellip;</div>

  <div id="achievementsContent" style="display:none;">
    <div class="page-hero">
      <p class="page-eyebrow">Investigator Record</p>
      <h1 class="page-title">Achievements</h1>
      <div class="page-rule"></div>
    </div>

   <section class="paper-section">
    <div class="wrap">
      <div class="progress-summary" id="progressSummary"></div>
      <div id="badgeGroups"></div>
      <p class="vault-total-note" id="vaultTotalNote"></p>
    </div>
   </section>

   <footer class="site-footer">
    <div class="footer-motto">
      <svg width="28" height="28" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="27" stroke="rgba(201,169,122,0.5)" stroke-width="1.2"/>
        <polygon points="30,10 25,22 35,22" fill="rgba(201,169,122,0.6)"/>
        <polygon points="30,16 21,30 39,30" fill="rgba(201,169,122,0.6)"/>
        <rect x="27" y="30" width="6" height="5" fill="rgba(201,169,122,0.55)"/>
      </svg>
      <span class="footer-motto-text">Truth is not given.<br>It is discovered.</span>
    </div>
   </footer>
  </div>

  <script src="js/vault-config.js"></script>
  <script src="js/badges.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/progress-sync.js"></script>
  <script>
  (function () {
    function render(progress) {
      document.getElementById('loadingNote').style.display = 'none';
      document.getElementById('achievementsContent').style.display = 'block';

      var earned = {};
      ((progress && progress.earned_badges) || []).forEach(function (id) { earned[id] = true; });

      var groups = document.getElementById('badgeGroups');

      if (typeof BADGES_CONFIG === 'undefined') {
        groups.innerHTML = '<p class="empty-note">This archive section is being indexed.</p>';
        return;
      }

      var order = [];
      var byCategory = {};
      BADGES_CONFIG.forEach(function (badge) {
        var cat = badge.category || 'Other';
        if (!byCategory[cat]) { byCategory[cat] = []; order.push(cat); }
        byCategory[cat].push(badge);
      });

      function buildGrid(badges) {
        var grid = document.createElement('div');
        grid.className = 'badge-grid';
        badges.forEach(function (badge) {
          var isEarned = !!earned[badge.id];
          var card = document.createElement('div');
          card.className = 'badge-card ' + (isEarned ? 'earned' : 'locked');
          card.innerHTML =
            '<div class="badge-symbol">' + (isEarned ? badge.symbol : '&#10067;') + '</div>' +
            '<div class="badge-name">' + (isEarned ? badge.name : 'Locked') + '</div>' +
            '<div class="badge-desc">' + (isEarned ? badge.description : (badge.hint || 'Keep investigating.')) + '</div>';
          grid.appendChild(card);
        });
        return grid;
      }

      // Split categories into global (always shown) and vaults (numbered,
      // progressively revealed) -- ordered by vault number, not insertion
      // order, so the reveal/current/next logic below is reliable regardless
      // of how BADGES_CONFIG happens to be laid out.
      var globalCats = [];
      var vaultEntries = [];
      order.forEach(function (cat) {
        var m = /^Vault\s+(\d+)/.exec(cat);
        if (m) {
          vaultEntries.push({ num: parseInt(m[1], 10), category: cat, badges: byCategory[cat] });
        } else {
          globalCats.push(cat);
        }
      });
      vaultEntries.sort(function (a, b) { return a.num - b.num; });

      vaultEntries.forEach(function (v) {
        v.earnedCount = v.badges.filter(function (b) { return !!earned[b.id]; }).length;
        v.completed = v.earnedCount === v.badges.length;
      });

      // The player's current vault is the first one not yet fully earned.
      // If every vault is complete, there is no "current" or "next" left.
      var currentIndex = -1;
      for (var vi = 0; vi < vaultEntries.length; vi++) {
        if (!vaultEntries[vi].completed) { currentIndex = vi; break; }
      }

      // ── Progress summary ──────────────────────────────────────────────
      var totalEarned = BADGES_CONFIG.filter(function (b) { return !!earned[b.id]; }).length;
      var vaultsCompleted = vaultEntries.filter(function (v) { return v.completed; }).length;
      var summaryEl = document.getElementById('progressSummary');
      var currentVaultName = currentIndex === -1 ? 'All vaults recovered' : vaultEntries[currentIndex].category;
      summaryEl.innerHTML =
        '<div class="progress-summary-row"><span>Achievements Earned</span><span class="val">' +
          totalEarned + ' / ' + BADGES_CONFIG.length + '</span></div>' +
        '<div class="progress-summary-row"><span>Vaults Completed</span><span class="val">' +
          vaultsCompleted + ' / ' + vaultEntries.length + '</span></div>' +
        '<div class="progress-summary-current">Current Investigation<span class="val"></span></div>';
      summaryEl.querySelector('.progress-summary-current .val').textContent = currentVaultName;

      // ── Global (non-vault) categories -- unchanged behavior ────────────
      globalCats.forEach(function (cat) {
        var section = document.createElement('div');
        section.className = 'badge-group';

        var title = document.createElement('div');
        title.className = 'badge-group-title';
        title.textContent = cat;
        section.appendChild(title);

        section.appendChild(buildGrid(byCategory[cat]));
        groups.appendChild(section);
      });

      // ── Archive Vaults -- progressive discovery ─────────────────────────
      // Real names are shown only for vaults the player has completed or is
      // actively working (current). Every other vault -- including the very
      // next one -- is a plain "Vault NN" row with a lock icon; no name.
      var heading = document.createElement('div');
      heading.className = 'archive-vaults-heading';
      heading.textContent = 'Archive Vaults';
      groups.appendChild(heading);

      vaultEntries.forEach(function (v, idx) {
        var isCurrent = idx === currentIndex;
        var expandable = v.completed || isCurrent;
        var numStr = (v.num < 10 ? '0' : '') + v.num;

        if (expandable) {
          var details = document.createElement('details');
          details.className = 'vault-group';
          if (isCurrent) { details.open = true; }

          var summary = document.createElement('summary');
          summary.className = 'vault-summary';
          summary.innerHTML =
            '<span class="vault-summary-left"><span class="vault-caret">&#9656;</span>' +
            '<span class="vault-title"></span></span>' +
            '<span class="vault-count"></span>';
          var statusIcon = v.completed ? '✓' : '▶';
          summary.querySelector('.vault-title').textContent = v.category + ' ' + statusIcon;
          var countEl = summary.querySelector('.vault-count');
          countEl.textContent = v.earnedCount + ' / ' + v.badges.length;
          if (v.completed) { countEl.classList.add('complete'); }

          details.appendChild(summary);
          details.appendChild(buildGrid(v.badges));
          groups.appendChild(details);
        } else {
          var row = document.createElement('div');
          row.className = 'vault-locked-row';
          var titleSpan = document.createElement('span');
          titleSpan.className = 'vault-title';
          titleSpan.textContent = 'Vault ' + numStr;
          var lockSpan = document.createElement('span');
          lockSpan.className = 'vault-lock-icon';
          lockSpan.innerHTML = '&#128274;';
          row.appendChild(titleSpan);
          row.appendChild(lockSpan);
          groups.appendChild(row);
        }
      });

      document.getElementById('vaultTotalNote').textContent = vaultEntries.length + ' Vaults Total';
    }

    if (!window.AVProgressSync) {
      document.getElementById('loadingNote').textContent = 'Achievements are unavailable right now.';
      return;
    }

    window.AVProgressSync.getUser().then(function (user) {
      if (!user) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent('achievements.html');
        return;
      }
      window.AVProgressSync.getSupabaseProgress(user).then(function (progress) {
        render(progress);
      });
    });
  })();
  </script>

  
</body>
</html>
